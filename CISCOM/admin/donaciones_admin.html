<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestionar Donaciones · Panel Líder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* Estilos similares a habitantes.html */
    body { font-family:'Inter',sans-serif; background:#f3f4f6; margin:0; display:flex; }
    .sidebar { width:260px; background:#0f766e; color:white; min-height:100vh; padding:24px 16px; position:fixed; }
    .main-content { margin-left:260px; padding:32px 40px; width:calc(100% - 260px); }
    .btn { background:#0f766e; color:white; border:none; padding:8px 16px; border-radius:20px; cursor:pointer; margin-right:8px; }
    .btn-danger { background:#dc2626; }
    table { width:100%; background:white; border-radius:16px; border-collapse:collapse; }
    th { background:#f3f4f6; padding:14px; }
    td { padding:12px 14px; border-bottom:1px solid #e5e7eb; }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="logo">🌱 Panel Líder</div>
  <nav>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="habitantes.html">👥 Habitantes</a>
    <a href="donaciones_admin.html" class="active">🎁 Donaciones</a>
    <a href="gestionar_servicios.html">📍 Servicios</a>
    <a href="crecimiento.html">📈 Crecimiento</a>
    <a href="generar_informe.html">📄 Informe</a>
  </nav>
</div>
<div class="main-content">
  <h2>🎁 Gestión de Donaciones</h2>
  <a href="registrar_donacion.html" class="btn" style="display:inline-block; margin:20px 0;">➕ Nueva donación</a>
  <div id="lista"></div>
</div>

<script>
  const liderId = localStorage.getItem('liderId');
  if (!liderId) window.location.href = 'login.html';

  async function cargarDonaciones() {
    const res = await fetch(`../api/donaciones.php?lider_id=${liderId}`);
    const donaciones = await res.json();
    let html = `<table><tr><th>Fecha</th><th>Donante</th><th>Tipo</th><th>Cantidad</th><th>Acciones</th></tr>`;
    donaciones.forEach(d => {
      html += `<tr>
        <td>${d.fecha_donacion}</td><td>${d.nombre_donante}</td><td>${d.tipo_donacion}</td>
        <td>${d.cantidad} ${d.unidad_medida||''}</td>
        <td>
          <button class="btn" onclick="editar(${d.id})">✏️</button>
          <button class="btn btn-danger" onclick="eliminar(${d.id})">🗑️</button>
        </td>
      </tr>`;
    });
    html += '</table>';
    document.getElementById('lista').innerHTML = html;
  }

  window.editar = (id) => {
    // Redirige al formulario de registro con el id en URL para editar
    window.location.href = `registrar_donacion.html?id=${id}`;
  };

  window.eliminar = async (id) => {
    if (!confirm('¿Eliminar esta donación?')) return;
    await fetch(`../api/donaciones.php?id=${id}`, { method: 'DELETE' });
    cargarDonaciones();
  };

  cargarDonaciones();
</script>
</body>
</html>
