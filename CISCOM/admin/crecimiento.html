<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Crecimiento · Panel Líder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Inter',sans-serif; background:#f3f4f6; margin:0; display:flex; }
    .sidebar { width:260px; background:#0f766e; color:white; min-height:100vh; padding:24px 16px; position:fixed; }
    .main-content { margin-left:260px; padding:32px 40px; width:calc(100% - 260px); }
    .form-container { background:white; border-radius:20px; padding:30px; max-width:600px; }
    label { display:block; margin:16px 0 6px; font-weight:500; }
    input, select, textarea { width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; }
    .btn { background:#0f766e; color:white; border:none; padding:12px 24px; border-radius:30px; cursor:pointer; margin-top:20px; }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="logo">🌱 Panel Líder</div>
  <nav>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="habitantes.html">👥 Habitantes</a>
    <a href="donaciones_admin.html">🎁 Donaciones</a>
    <a href="gestionar_servicios.html">📍 Servicios</a>
    <a href="crecimiento.html" class="active">📈 Crecimiento</a>
    <a href="generar_informe.html">📄 Informe</a>
  </nav>
</div>
<div class="main-content">
  <div class="form-container">
    <h2>📈 Registro de Crecimiento Comunitario</h2>
    <p>Complete este formulario mensualmente para medir la evolución de la zona.</p>
    <form id="crecimientoForm">
      <label>Fecha de observación *</label>
      <input type="date" name="fecha_observacion" required>
      
      <label>Número de nuevas familias llegadas al sector</label>
      <input type="number" name="nuevas_familias" min="0" value="0">
      
      <label>Número de nuevas viviendas (formales/informales)</label>
      <input type="number" name="nuevas_viviendas" min="0" value="0">
      
      <label>Mejoras en infraestructura (descripción)</label>
      <textarea name="mejoras_infraestructura" rows="3"></textarea>
      
      <label>Observaciones generales</label>
      <textarea name="observaciones" rows="3"></textarea>
      
      <button type="submit" class="btn">Guardar registro</button>
    </form>
    <div id="mensaje" style="margin-top:16px;"></div>
  </div>
</div>

<script>
  const liderId = localStorage.getItem('liderId');
  if (!liderId) window.location.href = 'login.html';

  document.getElementById('crecimientoForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    data.lider_id = liderId;
    
    const res = await fetch('../api/crecimiento.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    const result = await res.json();
    document.getElementById('mensaje').textContent = result.message;
    if (result.success) e.target.reset();
  });
</script>
</body>
</html>
