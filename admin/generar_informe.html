<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generar Informe | Panel Líder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background:#f3f4f6; margin:0; display:flex; }
    .sidebar { width:260px; background:#0f766e; color:white; min-height:100vh; padding:24px 16px; position:fixed; }
    .sidebar nav a { display:block; color:#e0f2fe; text-decoration:none; padding:12px 16px; border-radius:8px; margin-bottom:6px; font-weight:500; }
    .sidebar nav a:hover, .sidebar nav a.active { background:#0a5c55; color:white; }
    .main-content { margin-left:260px; padding:32px 40px; }
    .informe-container { background:white; border-radius:20px; padding:30px; }
    .filtros { display:flex; gap:20px; margin-bottom:30px; }
    table { width:100%; border-collapse:collapse; margin:20px 0; }
    th, td { padding:12px; border-bottom:1px solid #e5e7eb; text-align:left; }
    .btn { background:#0f766e; color:white; padding:12px 24px; border:none; border-radius:30px; cursor:pointer; }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="logo">🌱 Panel Líder</div>
  <nav>
    <a href="../dashboard.html">📊 Dashboard</a>
    <a href="registrar_habitante.html">👥 Habitante</a>
    <a href="registrar_donacion.html">🎁 Donación</a>
    <a href="gestionar_servicios.html">📍 Servicios</a>
    <a href="generar_informe.html" class="active">📄 Informe</a>
  </nav>
</div>
<div class="main-content">
  <div class="informe-container">
    <h2>📊 Informe Mensual para Alcaldía</h2>
    <div class="filtros">
      <select id="mesSelect">
        <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
        <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
        <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
        <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
      </select>
      <select id="anioSelect"></select>
      <button class="btn" id="generarBtn">Generar informe</button>
      <button class="btn" id="exportarBtn" style="background:#4b5563;">📥 Exportar PDF</button>
    </div>
    <div id="informeContent">
      <p>Seleccione mes y año para generar el informe.</p>
    </div>
  </div>
</div>
<script>
  const liderId = localStorage.getItem('liderId');
  if (!liderId) window.location.href = 'login.html';

  // Llenar años
  const anioSelect = document.getElementById('anioSelect');
  const currentYear = new Date().getFullYear();
  for (let y = currentYear; y >= currentYear-5; y--) {
    anioSelect.add(new Option(y, y));
  }

  document.getElementById('generarBtn').addEventListener('click', async () => {
    const mes = document.getElementById('mesSelect').value;
    const anio = anioSelect.value;
    const res = await fetch(`../api/informe.php?lider_id=${liderId}&mes=${mes}&anio=${anio}`);
    const data = await res.json();
    
    const html = `
      <h3>Informe ${mes}/${anio} - Sector ${localStorage.getItem('liderSector')}</h3>
      <table>
        <tr><th>Indicador</th><th>Valor</th></tr>
        <tr><td>Total habitantes registrados</td><td>${data.total_habitantes}</td></tr>
        <tr><td>Alta vulnerabilidad</td><td>${data.alta} (${((data.alta/data.total_habitantes)*100).toFixed(1)}%)</td></tr>
        <tr><td>Media vulnerabilidad</td><td>${data.media} (${((data.media/data.total_habitantes)*100).toFixed(1)}%)</td></tr>
        <tr><td>Baja vulnerabilidad</td><td>${data.baja} (${((data.baja/data.total_habitantes)*100).toFixed(1)}%)</td></tr>
        <tr><td>Total donaciones recibidas</td><td>${data.total_donaciones}</td></tr>
        <tr><td>Valor estimado donaciones</td><td>$${data.valor_donaciones || 0}</td></tr>
        <tr><td>Servicios comunitarios activos</td><td>${data.servicios_activos}</td></tr>
        <tr><td>Crecimiento poblacional (vs mes anterior)</td><td>${data.crecimiento} nuevos registros</td></tr>
      </table>
      <h4>Distribución por tipo de persona:</h4>
      <table>${data.tipos_persona.map(t => `<tr><td>${t.tipo}</td><td>${t.cantidad}</td></tr>`).join('')}</table>
      <h4>Donaciones del mes:</h4>
      <table>${data.donaciones_detalle.map(d => `<tr><td>${d.nombre_donante}</td><td>${d.tipo_donacion}</td><td>${d.cantidad} ${d.unidad_medida}</td></tr>`).join('')}</table>
    `;
    document.getElementById('informeContent').innerHTML = html;
  });

  document.getElementById('exportarBtn').addEventListener('click', () => {
    window.print(); // Simplificado: imprime la página como PDF
  });
</script>
</body>
</html>
