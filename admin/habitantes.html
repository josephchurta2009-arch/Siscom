<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestionar Habitantes · Panel Líder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Inter',sans-serif; background:#f3f4f6; margin:0; display:flex; }
    .sidebar { width:260px; background:#0f766e; color:white; min-height:100vh; padding:24px 16px; position:fixed; }
    .main-content { margin-left:260px; padding:32px 40px; width:calc(100% - 260px); }
    .btn { background:#0f766e; color:white; border:none; padding:8px 16px; border-radius:20px; cursor:pointer; margin-right:8px; }
    .btn-danger { background:#dc2626; }
    table { width:100%; background:white; border-radius:16px; border-collapse:collapse; }
    th { background:#f3f4f6; padding:14px; text-align:left; }
    td { padding:12px 14px; border-bottom:1px solid #e5e7eb; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
    .modal-content { background:white; padding:30px; border-radius:20px; width:500px; max-height:90vh; overflow-y:auto; }
  </style>
</head>
<body>
<div class="sidebar">
  <div class="logo">🌱 Panel Líder</div>
  <nav>
    <a href="../dashboard.html">📊 Dashboard</a>
    <a href="habitantes.html" class="active">👥 Habitantes</a>
    <a href="donaciones_admin.html">🎁 Donaciones</a>
    <a href="gestionar_servicios.html">📍 Servicios</a>
    <a href="crecimiento.html">📈 Crecimiento</a>
    <a href="generar_informe.html">📄 Informe</a>
  </nav>
</div>
<div class="main-content">
  <h2>👥 Gestión de Habitantes</h2>
  <a href="registrar_habitante.html" class="btn" style="display:inline-block; margin:20px 0;">➕ Nuevo habitante</a>
  <div id="lista"></div>
</div>

<!-- Modal de edición (simplificado, usa el mismo formulario que registrar_habitante) -->
<div class="modal" id="editModal">
  <div class="modal-content">
    <h3>Editar Habitante</h3>
    <form id="editForm">
      <input type="hidden" id="editId">
      <!-- Campos similares a registrar_habitante, pero resumidos -->
      <label>Nombre completo</label><input type="text" id="editNombre" required>
      <label>Documento</label><input type="text" id="editDocumento" required>
      <label>Sector</label><input type="text" id="editSector">
      <label>Nivel vulnerabilidad</label>
      <select id="editVulnerabilidad"><option value="alta">Alta</option><option value="media">Media</option><option value="baja">Baja</option></select>
      <button type="submit" class="btn" style="margin-top:16px;">Guardar cambios</button>
      <button type="button" class="btn" onclick="cerrarModal()">Cancelar</button>
    </form>
  </div>
</div>

<script>
  const liderId = localStorage.getItem('liderId');
  if (!liderId) window.location.href = 'login.html';

  async function cargarHabitantes() {
    const res = await fetch(`../api/habitantes.php?lider_id=${liderId}`);
    const habitantes = await res.json();
    let html = `<table><tr><th>Nombre</th><th>Documento</th><th>Sector</th><th>Vulnerabilidad</th><th>Acciones</th></tr>`;
    habitantes.forEach(h => {
      html += `<tr>
        <td>${h.nombre_completo}</td><td>${h.numero_documento}</td><td>${h.sector||'-'}</td>
        <td>${h.nivel_vulnerabilidad}</td>
        <td>
          <button class="btn" onclick="editar(${h.id})">✏️</button>
          <button class="btn btn-danger" onclick="eliminar(${h.id})">🗑️</button>
        </td>
      </tr>`;
    });
    html += '</table>';
    document.getElementById('lista').innerHTML = html;
  }

  window.editar = async (id) => {
    const res = await fetch(`../api/habitantes.php?id=${id}`);
    const h = await res.json();
    document.getElementById('editId').value = h.id;
    document.getElementById('editNombre').value = h.nombre_completo;
    document.getElementById('editDocumento').value = h.numero_documento;
    document.getElementById('editSector').value = h.sector || '';
    document.getElementById('editVulnerabilidad').value = h.nivel_vulnerabilidad;
    document.getElementById('editModal').style.display = 'flex';
  };

  window.eliminar = async (id) => {
    if (!confirm('¿Eliminar este habitante?')) return;
    await fetch(`../api/habitantes.php?id=${id}`, { method: 'DELETE' });
    cargarHabitantes();
  };

  function cerrarModal() { document.getElementById('editModal').style.display = 'none'; }

  document.getElementById('editForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('editId').value;
    const data = {
      nombre_completo: document.getElementById('editNombre').value,
      numero_documento: document.getElementById('editDocumento').value,
      sector: document.getElementById('editSector').value,
      nivel_vulnerabilidad: document.getElementById('editVulnerabilidad').value
    };
    await fetch(`../api/habitantes.php?id=${id}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    cerrarModal();
    cargarHabitantes();
  });

  cargarHabitantes();
</script>
</body>
</html>
